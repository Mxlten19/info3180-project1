<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}PropList{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- ── NAV ── -->
  <header class="navbar">
    <a href="{{ url_for('main.index') }}" class="nav-brand">
      <span class="brand-icon">🏠</span> PropList
    </a>
    <nav class="nav-links">
      <a href="{{ url_for('main.index') }}">Home</a>
      <a href="{{ url_for('main.about') }}">About</a>
      <a href="{{ url_for('main.create_property') }}" class="nav-highlight">New Property</a>
      <a href="{{ url_for('main.properties') }}">Properties</a>
    </nav>
  </header>

  <!-- ── FLASH MESSAGES ── -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-container">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <!-- ── MAIN CONTENT ── -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>&copy; 2026 PropList · INFO3180 Project 1</p>
  </footer>

</body>
</html>
